<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kris Halmstad – Prototyp</title>

  <meta name="theme-color" content="#004a7f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <style>
    /* Baslayout */
    body { margin:0; font-family:system-ui, -apple-system, "Segoe UI", Roboto; background:#0b1116; color:#e7eef6; }
    header { padding:16px; background:#0d1520; border-bottom:1px solid #223042; }
    h1 { margin:0; font-size:20px; }

    /* Header: logga + rubrik */
    .brand { display:flex; align-items:center; gap:12px; }
    .brand img { height:28px; width:auto; display:block; }
    @media (min-width: 768px){ .brand img { height:32px; } }

    /* Flikar */
    nav { display:flex; gap:8px; background:#0d1520; padding:8px; position:sticky; top:52px; z-index:5; }
    nav button {
      padding:8px 12px; border-radius:10px; background:#121a22;
      color:#e7eef6; border:1px solid #223042; cursor:pointer;
    }
    nav button.active { background:#101c29; border-color:#0072ce; }

    /* Paneler & kort */
    .panel { display:none; padding:16px; }
    .panel.active { display:block; }
    .card { padding:12px; border-radius:12px; background:#121a22; border:1px solid #223042; margin-bottom:12px; }

    /* Karta */
    #map { height:360px; border-radius:12px; border:1px solid #223042; }

    /* Knappar */
    .btn, .btn-outline { padding:8px 12px; border-radius:10px; font-weight:600; cursor:pointer; border:1px solid #0072ce; }
    .btn{ background:#0072ce; color:#fff; }
    .btn-outline{ background:transparent; color:#0072ce; }

    /* Krislägen (inbäddad) — dold i grundläge, flex när aktiv */
    .panel.panel-embed { padding:16px; min-height:calc(100vh - 120px); }
    .panel.panel-embed.active { display:flex; flex-direction:column; gap:12px; }
    .embed-frame {
      flex:1 1 auto; width:100%; height:70vh; min-height:600px;
      border:0; border-radius:12px; background:#0d1520; overflow:auto;
    }

    /* Watermark-bakgrund med Halmstads logga */
    :root{ --watermark-opacity:0.06; --watermark-size:min(60vw, 800px); }
    body::before{
      content:""; position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(transparent 0, transparent 30%, rgba(0,0,0,0.08) 100%) center/200% 200% no-repeat;
      opacity:var(--watermark-opacity); pointer-events:none;
    }
    body, header, nav, .panel, .card, #map { position:relative; z-index:1; }
    @media (prefers-reduced-motion: reduce){ body::before{ background-attachment: initial; } }
  </style>
</head>
<body>

<!-- Header med logga -->
<header>
  <div class="brand">
    <h1>Kris Halmstad</h1>
  </div>
</header>

<!-- Flikar -->
<nav>
  <button data-tab="justnu" class="active">Just nu</button>
  <button data-tab="vma">VMA</button>
  <button data-tab="nyheter">Nyheter</button>
  <button data-tab="platser">Platser</button>
  <button data-tab="krislagen">Krislägen</button>
</nav>

<!-- PANEL: JUST NU -->
<div id="panel-justnu" class="panel active">
  <div class="card">
    <h3>Följ aktuell information</h3>
    <p>Se VMA, nyheter och larmpunkter.</p>

    <button class="btn" onclick="selectTab('vma')">Visa VMA</button>
    <button class="btn-outline" onclick="selectTab('nyheter')">Visa nyheter</button>
    <button class="btn-outline" onclick="selectTab('krislagen')">Öppna Krislägen</button>
  </div>
</div>

<!-- PANEL: VMA -->
<div id="panel-vma" class="panel">
  <h2>VMA</h2>
  <div id="vmaList" class="card">Laddar…</div>
</div>

<!-- PANEL: NYHETER -->
<div id="panel-nyheter" class="panel">
  <h2>Nyheter</h2>
  <div id="newsList" class="card">Laddar…</div>
</div>

<!-- PANEL: PLATSER -->
<div id="panel-platser" class="panel">
  <h2>Platser</h2>
  <div id="map"></div>
</div>

<!-- PANEL: KRISLÄGEN (inbäddad lokalkopia) -->
<div id="panel-krislagen" class="panel panel-embed">
  <h2>Krislägen</h2>

  <iframe src="krislagen/index.html" class="embed-frame" title="Krislägen"></iframe>

  <div class="card" style="margin-top:12px;">
    Om något ser konstigt ut:
    <a class="btn-outline" href="krislagen/index.html" target="_blank" rel="noopener">Öppna Krislägen i hel flik</a>
  </div>
</div>

<script>
  // Initialize tab system when DOM is ready
  document.addEventListener('DOMContentLoaded', () => {
    console.log('DOM Content Loaded - Initializing tab system');

    function selectTab(tab){
      console.log('Selecting tab:', tab);
      
      // Remove active class from all buttons and panels
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      
      // Add active class to selected button and panel
      const btn = document.querySelector(`[data-tab='${tab}']`);
      const panel = document.getElementById(`panel-${tab}`);
      
      if (btn) {
        btn.classList.add("active");
        console.log('Button activated:', tab);
      } else {
        console.warn('Button not found for tab:', tab);
      }
      
      if (panel) {
        panel.classList.add("active");
        console.log('Panel activated:', tab);
      } else {
        console.warn('Panel not found for tab:', tab);
      }
      
      // Load map when platser tab is selected
      if (tab === "platser") {
        setTimeout(initMap, 100);
      }
    }
    
    // Make selectTab available globally for onclick handlers
    window.selectTab = selectTab;

    // Attach click listeners to nav buttons
    document.querySelectorAll("nav button").forEach(btn => {
      btn.addEventListener("click", (e) => {
        console.log('Button clicked:', btn.dataset.tab);
        selectTab(btn.dataset.tab);
      });
    });

    // Load initial data
    loadVMA();
    loadNews();
    
    console.log('Tab system initialized');
  });

  // PWA – register service worker after page load
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch((err) => {
        console.log('Service Worker registration failed:', err);
      });
    });
  }

  // VMA - with timeout
  async function loadVMA(){
    try{
      console.log('Loading VMA data...');
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
      
      const r = await fetch("https://api.krisinformation.se/v3/vmas?language=sv&counties=" + encodeURIComponent("Hallands län"), {
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      
      const d = await r.json();
      const box = document.querySelector("#vmaList");
      if (!box) {
        console.warn('VMA list container not found');
        return;
      }
      
      box.innerHTML = "";
      if (!Array.isArray(d) || !d.length){ 
        box.textContent = "Inga VMA.";
        console.log('No VMA data');
        return; 
      }
      d.forEach(i => {
        box.innerHTML += `<div><strong>${i.Title||'VMA'}</strong><br>${i.Preamble||i.PushMessage||''}</div><hr>`;
      });
      console.log('VMA data loaded:', d.length, 'items');
    } catch(e){
      const box = document.querySelector("#vmaList");
      if (box) box.textContent = "Kunde inte hämta VMA.";
      console.error("VMA load error:", e);
    }
  }

  // Nyheter - with timeout
  async function loadNews(){
    try{
      console.log('Loading news data...');
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
      
      const r = await fetch("https://api.krisinformation.se/v3/news?language=sv&counties=" + encodeURIComponent("Hallands län"), {
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      
      const d = await r.json();
      const box = document.querySelector("#newsList");
      if (!box) {
        console.warn('News list container not found');
        return;
      }
      
      box.innerHTML = "";
      if (!Array.isArray(d) || !d.length){ 
        box.textContent = "Inga nyheter.";
        console.log('No news data');
        return; 
      }
      d.forEach(i => {
        box.innerHTML += `<div><strong>${i.Title||'Nyhet'}</strong><br>${i.Preamble||''}</div><hr>`;
      });
      console.log('News data loaded:', d.length, 'items');
    } catch(e){
      const box = document.querySelector("#newsList");
      if (box) box.textContent = "Kunde inte hämta nyheter.";
      console.error("News load error:", e);
    }
  }

  // Karta
  let map;
  function initMap(){
    if (map) return;
    console.log('Initializing map...');
    try {
      map = L.map("map").setView([56.673,12.857], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19}).addTo(map);
      console.log('Map initialized');
    } catch(e) {
      console.error('Map initialization error:', e);
    }
  }
</script>

</body>
</html>
