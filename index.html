<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kris Halmstad – Prototyp</title>

  <!-- PWA -->
  <meta name="theme-color" content="#004a7f" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />

  <!-- Leaflet (karta) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity=""
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity=""
          crossorigin="anonymous"></script>

  <style>
    /* Baslayout */
    body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto; background:#0b1116; color:#e7eef6; }
    header { padding:16px; background:#0d1520; border-bottom:1px solid #223042; }
    h1 { margin:0; font-size:20px; }

    /* Header: logga + rubrik */
    .brand { display:flex; align-items:center; gap:12px; }
    .brand img { height:28px; width:auto; display:block; }
    @media (min-width: 768px){ .brand img { height:32px; } }

    /* Flikar */
    nav { display:flex; gap:8px; background:#0d1520; padding:8px; position:sticky; top:52px; z-index:5; }
    nav button {
      padding:8px 12px; border-radius:10px; background:#121a22;
      color:#e7eef6; border:1px solid #223042; cursor:pointer;
    }
    nav button.active { background:#101c29; border-color:#0072ce; }

    /* Paneler & kort */
    .panel { display:none; padding:16px; }
    .panel.active { display:block; }
    .card { padding:12px; border-radius:12px; background:#121a22; border:1px solid #223042; margin-bottom:12px; }

    /* Karta */
    #map { height:360px; border-radius:12px; border:1px solid #223042; }

    /* Knappar */
    .btn, .btn-outline { padding:8px 12px; border-radius:10px; font-weight:600; cursor:pointer; border:1px solid #0072ce; }
    .btn{ background:#0072ce; color:#fff; }
    .btn-outline{ background:transparent; color:#0072ce; }

    /* --- Krislägen (inbäddad vy) --- */
    /* Dold i grundläge; blir flex ENDAST när aktiv */
    .panel.panel-embed { padding:16px; min-height:calc(100vh - 120px); }
    .panel.panel-embed.active { display:flex; flex-direction:column; gap:12px; }
    .embed-frame {
      flex:1 1 auto; width:100%; height:70vh; min-height:600px;
      border:0; border-radius:12px; background:#0d1520; overflow:auto;
    }

    /* --- Watermark-bakgrund med Halmstads logga --- */
    :root{ --watermark-opacity:0.06; --watermark-size:min(60vw, 800px); }
    body::before{
      content:""; position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(transparent 0, transparent 30%, rgba(0,0,0,0.08) 100%) center/200% 200% no-repeat,
        url("./assets/halmstad-logo.svg") center/var(--watermark-size) no-repeat;
      opacity:var(--watermark-opacity); pointer-events:none;
    }
    body, header, nav, .panel, .card, #map { position:relative; z-index:1; }
    @media (prefers-reduced-motion: reduce){ body::before{ background-attachment: initial; } }
  </style>
</head>
<body>

<!-- Header med logga -->
<header>
  <div class="brand">
    <img src="./assets/halmstad-logo.svg" alt="Halmstads kommun" />
    <h1>Kris Halmstad</h1>
  </div>
</header>

<!-- Flikar -->
<nav>
  <button data-tab="justnu" class="active">Just nu</button>
  <button data-tab="vma">VMA</button>
  <button data-tab="nyheter">Nyheter</button>
  <button data-tab="platser">Platser</button>
  <button data-tab="krislagen">Krislägen</button>
</nav>

<!-- PANEL: JUST NU -->
<div id="panel-justnu" class="panel active">
  <div class="card">
    <h3>Följ aktuell information</h3>
    <p>Se VMA, nyheter och larmpunkter.</p>

    <button class="btn" onclick="selectTab('vma')">Visa VMA</button>
    <button class="btn-outline" onclick="selectTab('nyheter')">Visa nyheter</button>
    <button class="btn-outline" onclick="window.open('./krislagen/index.html','_blank','noopener')">Öppna Krislägen</button>
  </div>
</div>

<!-- PANEL: VMA -->
<div id="panel-vma" class="panel">
  <h2>VMA</h2>
  <div id="vmaList" class="card">Laddar…</div>
</div>

<!-- PANEL: NYHETER -->
<div id="panel-nyheter" class="panel">
  <h2>Nyheter</h2>
  <div id="newsList" class="card">Laddar…</div>
</div>

<!-- PANEL: PLATSER -->
<div id="panel-platser" class="panel">
  <h2>Platser</h2>
  <div id="map"></div>
</div>

<!-- PANEL: KRISLÄGEN (inbäddad lokalkopia) -->
<div id="panel-krislagen" class="panel panel-embed">
  <h2>Krislägen</h2>

  <iframe src="./krislagen/index.html"
          class="embed-frame"
          title="Krislägen (lokalt innehåll)"
          loading="lazy"
          referrerpolicy="no-referrer"></iframe>

  <div class="card" style="margin-top:12px;">
    Om något ser konstigt ut:
    <a href="./krislagen/index.html" target="_blank" rel="noopener">Öppna Krislägen i hel flik</a>
  </div>
</div>

<script>
  // Kör när DOM är redo – säkrar att knappar kopplas
  document.addEventListener('DOMContentLoaded', () => {
    function selectTab(tab){
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      const btn = document.querySelector(`[data-tab='${tab}']`);
      const panel = document.getElementById(`panel-${tab}`);
      if (btn) btn.classList.add("active");
      if (panel) panel.classList.add("active");
      if (tab === "platser") initMap();
    }
    window.selectTab = selectTab; // för onclick i knappar

    document.querySelectorAll("nav button").forEach(btn =>
      btn.addEventListener("click", () => selectTab(btn.dataset.tab))
    );

    loadVMA();
    loadNews();
  });

  // PWA – registrera SW efter att sidan laddats
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
    });
  }

  // VMA
  async function loadVMA(){
    try{
      const r = await fetch("https://api.krisinformation.se/v3/vmas?language=sv&counties=" + encodeURIComponent("Hallands län"));
      const d = await r.json();
      const box = document.querySelector("#vmaList");
      box.innerHTML = "";
      if (!Array.isArray(d) || !d.length){ box.textContent = "Inga VMA."; return; }
      d.forEach(i => {
        box.innerHTML += `<div><strong>${i.Title||'VMA'}</strong><br>${i.Preamble||i.PushMessage||''}</div><hr>`;
      });
    } catch(e){
      const box = document.querySelector("#vmaList");
      if (box) box.textContent = "Kunde inte hämta VMA.";
    }
  }

  // Nyheter
  async function loadNews(){
    try{
      const r = await fetch("https://api.krisinformation.se/v3/news?language=sv&counties=" + encodeURIComponent("Hallands län"));
      const d = await r.json();
      const box = document.querySelector("#newsList");
      box.innerHTML = "";
      if (!Array.isArray(d) || !d.length){ box.textContent = "Inga nyheter."; return; }
      d.forEach(i => {
        box.innerHTML += `<div><strong>${i.Title||'Nyhet'}</strong><br>${i.Preamble||''}</div><hr>`;
      });
    } catch(e){
      const box = document.querySelector("#newsList");
      if (box) box.textContent = "Kunde inte hämta nyheter.";
    }
  }

  // Karta
  let map;
  function initMap(){
    if (map) return;
    map = L.map("map").setView([56.673,12.857], 11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19}).addTo(map);
  }
</script>

</body>
</html>
