<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Krislåda – Krislägen</title>

  <link rel="stylesheet" href="./styles.css"/>
  <!-- Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <style>
    /* Lokal knappstil – påverkar inte övriga sidor */
    .actions-top{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
    .btn{padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer}
    .btn-outline{border:1px solid #2ea3ff;background:transparent;color:#2ea3ff}
    .btn-primary{border:1px solid #0072ce;background:#0072ce;color:#fff}
    .summary{margin-left:auto;color:#a6b7c8;font-size:12px;align-self:center}
    /* Kategoriruta återanvänder styles.css .section-look med strukturen här */
    .category{border:1px solid var(--border);border-radius:14px;background:#101722;padding:12px;margin:12px 0}
    .category h3{margin:0 0 8px 0}
    .checklist{list-style:none;padding-left:0;display:grid;gap:10px;margin:0}
    .checklist li{display:flex;align-items:flex-start;gap:10px;background:#0f1720;border:1px solid var(--border);border-radius:10px;padding:10px}
    .checklist input{margin-top:2px}
  </style>
</head>
<body>
<header>
  <div class="title">
    <a class="back" href="./index.html">← Alla krislägen</a>
    <h1>🎒 Krislåda – Hemberedskap 7 dagar</h1>
  </div>
</header>

<main>
  <!-- Topp-knappar -->
  <section class="section">
    <div class="actions-top">
      <button class="btn btn-outline" id="checkAllBtn">Markera allt</button>
      <button class="btn btn-outline" id="uncheckAllBtn">Avmarkera allt</button>
      <button class="btn btn-outline" id="resetBtn">Återställ</button>
      <button class="btn btn-primary" id="exportBtn">Exportera Excel</button>
      <span class="summary" id="summary">0/0 klara</span>
    </div>
  </section>

  <!-- Dynamiskt innehåll -->
  <section id="krisladaContainer"></section>

  <div class="footer-space"></div>
</main>

<script>
/* ========= Data ========= */
const STORE_KEY = 'kris-halmstad-krislada';
const DEFAULT = [
  { category:'Vatten 💧', items:[
    { text:'Dricksvatten 3–5 liter/person/dag i minst 7 dagar', done:false },
    { text:'Livsmedelsgodkända dunkar/flaskor med lock', done:false },
    { text:'Vattenrening (tabletter/filter/koka)', done:false }
  ]},
  { category:'Mat 🍲', items:[
    { text:'Konserver (soppa, gryta, bönor, fisk)', done:false },
    { text:'Torrvaror (ris, pasta, gryn, knäckebröd)', done:false },
    { text:'Bars, nötter, torkad frukt', done:false },
    { text:'Barnmat/specialkost vid behov', done:false }
  ]},
  { category:'Matlagning & Värme 🍳', items:[
    { text:'Stormkök/gas + bränsle (vädra säkert)', done:false },
    { text:'Tändstickor/tändare', done:false },
    { text:'Värmeljus/stearinljus + hållare', done:false },
    { text:'Filtar/varma kläder (lager-på-lager)', done:false }
  ]},
  { category:'Energi & Kommunikation 🔦📻', items:[
    { text:'Powerbank(ar) + kablar', done:false },
    { text:'Fick- eller pannlampa + batterier', done:false },
    { text:'Batteri-/vevradio för VMA/krisinformation', done:false },
    { text:'Utskrivna nödnummer: 112, 113 13, 1177, 114 14', done:false }
  ]},
  { category:'Hygien & Sjukvård 🩹', items:[
    { text:'Första hjälpen-kit', done:false },
    { text:'Personliga läkemedel för 7 dagar', done:false },
    { text:'Tvål, våtservetter, toalettpapper', done:false }
  ]},
  { category:'Dokument & Betalning 🪪', items:[
    { text:'ID-/kopior vattenskyddat', done:false },
    { text:'Kontanter i små valörer', done:false }
  ]},
  { category:'Övrigt 🧰', items:[
    { text:'Multiverktyg/kniv, silvertejp, snöre/buntband', done:false },
    { text:'Reflexväst(er), extra ficklampa', done:false }
  ]}
];

/* ========= Storage ========= */
const load = () => {
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return structuredClone(DEFAULT);
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : structuredClone(DEFAULT);
  }catch{ return structuredClone(DEFAULT); }
};
const save = s => localStorage.setItem(STORE_KEY, JSON.stringify(s));

let state = load();

/* ========= Render ========= */
function summarize(s){ let t=0,d=0; s.forEach(c=>c.items.forEach(i=>{t++; if(i.done) d++;})); return {t,d}; }

function render(){
  const wrap = document.getElementById('krisladaContainer');
  const sum = document.getElementById('summary');
  wrap.innerHTML = state.map((cat, ci) => {
    const items = (cat.items||[]).map((it, ii) => `
      <li>
        <input type="checkbox" id="i_${ci}_${ii}" ${it.done ? 'checked':''}
               onchange="toggle(${ci},${ii},this.checked)">
        <label for="i_${ci}_${ii}">${it.text}</label>
      </li>`).join('');
    return `
      <article class="category">
        <h3>${cat.category}</h3>
        <ul class="checklist">${items}</ul>
      </article>`;
  }).join('');

  const {t,d} = summarize(state);
  sum.textContent = `${d}/${t} klara`;
}

window.toggle = (ci,ii,val)=>{
  state[ci].items[ii].done = val;
  save(state);
  render();
};

/* ========= Buttons ========= */
document.getElementById('checkAllBtn').onclick = ()=>{
  state.forEach(c=>c.items.forEach(i=>i.done=true));
  save(state); render();
};
document.getElementById('uncheckAllBtn').onclick = ()=>{
  state.forEach(c=>c.items.forEach(i=>i.done=false));
  save(state); render();
};
document.getElementById('resetBtn').onclick = ()=>{
  if(!confirm('Återställa Krislådan till originalinnehåll?')) return;
  state = structuredClone(DEFAULT); save(state); render();
};
document.getElementById('exportBtn').onclick = async ()=>{
  const wb = new ExcelJS.Workbook();
  wb.created = new Date(); wb.creator = 'Kris Halmstad';
  const ws = wb.addWorksheet('Krislåda',{properties:{defaultRowHeight:18}});

  ws.addRow(['Krislåda – Hemberedskap (7 dagar)']).font = { bold:true, size:16 };
  ws.addRow([]);

  state.forEach(cat=>{
    ws.addRow([cat.category]).font = { bold:true };
    ws.addRow(['Post','Klar']);
    cat.items.forEach(it=> ws.addRow([it.text, it.done ? 'Ja':'Nej']));
    ws.addRow([]);
  });

  const buf = await wb.xlsx.writeBuffer();
  saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'krislada.xlsx');
};

/* ========= Init ========= */
render();
</script>

</body>
</html>
